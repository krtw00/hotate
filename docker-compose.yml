services:
  hotate:
    build: .
    container_name: hotate
    restart: unless-stopped
    environment:
      - HOTATE_USER=${HOTATE_USER:-admin}
      - HOTATE_PASS=${HOTATE_PASS:-changeme}
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ${SSH_KEY_DIR:-~/.ssh}:/home/node/.ssh:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hotate.rule=Host(`${APP_DOMAIN:-hotate.example.com}`)"
      - "traefik.http.routers.hotate.entrypoints=websecure"
      - "traefik.http.routers.hotate.tls.certresolver=letsencrypt"
      - "traefik.http.services.hotate.loadbalancer.server.port=3000"
      - "traefik.http.routers.hotate-http.rule=Host(`${APP_DOMAIN:-hotate.example.com}`)"
      - "traefik.http.routers.hotate-http.entrypoints=web"
      - "traefik.http.routers.hotate-http.middlewares=hotate-redirect"
      - "traefik.http.middlewares.hotate-redirect.redirectscheme.scheme=https"
    networks:
      - web

networks:
  web:
    external: true
