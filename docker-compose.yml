services:
  webssh:
    build: .
    container_name: webssh
    restart: unless-stopped
    environment:
      - WEBSSH_USER=${WEBSSH_USER:-admin}
      - WEBSSH_PASS=${WEBSSH_PASS:-changeme}
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ${SSH_KEY_DIR:-~/.ssh}:/home/node/.ssh:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webssh.rule=Host(`webssh.codenica.dev`)"
      - "traefik.http.routers.webssh.entrypoints=websecure"
      - "traefik.http.routers.webssh.tls.certresolver=letsencrypt"
      - "traefik.http.services.webssh.loadbalancer.server.port=3000"
      - "traefik.http.routers.webssh-http.rule=Host(`webssh.codenica.dev`)"
      - "traefik.http.routers.webssh-http.entrypoints=web"
      - "traefik.http.routers.webssh-http.middlewares=webssh-redirect"
      - "traefik.http.middlewares.webssh-redirect.redirectscheme.scheme=https"
    networks:
      - web

networks:
  web:
    external: true
