name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy WebSSH
        run: |
          rsync -a --exclude='.git' --exclude='data' --exclude='.env' --exclude='node_modules' ./ ~/apps/webssh/
          cd ~/apps/webssh
          docker compose build --no-cache
          docker compose up -d
